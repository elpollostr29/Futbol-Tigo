    playlist: playlist,
    width: "100%",
    height: "100%",
    aspectratio: "16:9",
    autostart: false,
    mute: false,
    preload: "auto",
    displaytitle: true,
    displaydescription: false
  });

  // Audio Boost
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isSmartTV = /SmartTV|Tizen|Web0S|SmartHub|Chromecast/i.test(navigator.userAgent);

  if (!isSmartTV) {
    player.on("play", function () {
      const video = document.querySelector("#player video");
      if (video && !video.audioBoostApplied) {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioCtx.createMediaElementSource(video);
          const gain = audioCtx.createGain();
          gain.gain.value = 5;
          source.connect(gain);
          gain.connect(audioCtx.destination);
          video.muted = false;
          video.volume = 1.0;
          video.audioBoostApplied = true;
        } catch(e) { console.warn("Audio boost no disponible:", e); }
      }
    });
  }

  if (isSmartTV) {
    player.on("ready", function () {

      const video = document.querySelector("#player video");
      if (video) {
        video.muted = false;
        try { video.volume = 1.0; } catch(e){}
      }
    });
  }

  // Fullscreen y orientación
  player.on("fullscreen", function(e) {
    const contenedor = document.getElementById("player");
    if (!isIOS && screen.orientation) {

      if (e.fullscreen) { try { screen.orientation.lock("landscape"); } catch(e){} } 
      else { try { screen.orientation.unlock(); } catch(e){} }
    }
    if (isIOS) {
      if (e.fullscreen) contenedor.classList.add("ios-landscape");
      else contenedor.classList.remove("ios-landscape");
    }
  });

}
