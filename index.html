<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaka Player DRM</title>

  <!-- Shaka Player -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial, sans-serif;
    }

    .player-container{
      width:90%;
      max-width:1200px;
      aspect-ratio:16/9;
      background:#000;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(255,255,255,0.15);
    }

    video{
      width:100%;
      height:100%;
      background:#000;
    }
  </style>
</head>

<body>

<div class="player-container">
  <video id="video"
         controls
         autoplay
         playsinline>
  </video>
</div>

<script>
async function initApp() {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Tu navegador no es compatible con Shaka Player");
    return;
  }

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  // Mostrar errores
  player.addEventListener('error', onErrorEvent);

  // Configuración DRM ClearKey
  player.configure({
    drm: {
      clearKeys: {
        "49b2c0e7037042b2aff9f064e0bb3311":
        "83849e30adf85440550292693147fbf7"
      }
    }
  });

  // URL del stream MPD
  const manifestUri =
    'https://sam-py-edge05.tigo.com.py/ccur-session/7f6e3fdb59994965abed8dd5c6faccf517487270122031b65a320aeed11ebae01d90082191a3c1a5MrOL1SVX7zpX7GuV2tRmo/rolling-buffer/APP_CHN2/APP_CHN2/transmux/index.mpd';

  try {

    await player.load(manifestUri);

    console.log('Stream cargado correctamente');

  } catch (error) {

    console.error('Error al cargar el video:', error);

  }
}

function onErrorEvent(event) {
  console.error('Error Shaka:', event.detail);
}

document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
