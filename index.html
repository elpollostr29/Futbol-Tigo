<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Shaka - Tigo Live</title>
    <!-- Script de Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #video-container {
            width: 100%;
            height: 100%;
            max-width: 1280px;
            max-height: 720px;
        }
        video {
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <script>
        // Nueva URL con el token actualizado
        const manifestUri = 'https://sam-py-edge05.tigo.com.py/ccur-session/7f6e3fdb59994965abed8dd5c6faccf517487270122031b65a320aeed11ebae01d90082191a3c1a5MrOL1SVX7zpX7GuV2tRmo/rolling-buffer/APP_CHN1/APP_CHN1/transmux/index.mpd';
        
        // Llaves ClearKey
        const clearKeys = {
            '1c62a216a5fe423f959cb1ca02f62d83': '54f2fdc83c1da33cd9269bf21e08218c'
        };

        async function initApp() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                initPlayer();
            } else {
                alert('Tu navegador no es compatible con este reproductor.');
            }
        }

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // Manejo de errores en consola
            player.addEventListener('error', (e) => console.error('Error de Shaka:', e.detail));

            // Configuración avanzada
            player.configure({
                drm: {
                    clearKeys: clearKeys
                },
                streaming: {
                    // Ajuste para mejorar la carga de buffers en vivo
                    lowLatencyMode: true,
                    jumpLargeGaps: true
                }
            });

            try {
                await player.load(manifestUri);
                console.log('Stream cargado correctamente');
            } catch (error) {
                console.error('Error al cargar el contenido:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
