<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player DASH DRM</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

  <style>
    body{
      margin:0;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    video{
      width:90%;
      max-width:1200px;
      border-radius:10px;
      background:#000;
    }
  </style>
</head>
<body>

<video id="video" controls autoplay playsinline></video>

<script>
const config = {
  manifestUri: "https://sam-py-edge05.tigo.com.py/ccur-session/7f6e3fdb59994965abed8dd5c6faccf517487270122031b65a320aeed11ebae01d90082191a3c1a5MrOL1SVX7zpX7GuV2tRmo/rolling-buffer/APP_CHN2/APP_CHN2/transmux/index.mpd",
  drm: {
    clearKeys: {
      "49b2c0e7037042b2aff9f064e0bb3311":
      "83849e30adf85440550292693147fbf7"
    }
  }
};

async function initPlayer() {
  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {
    alert("Navegador no compatible");
    return;
  }

  const video = document.getElementById('video');
  const player = new shaka.Player(video);

  player.configure({
    drm: config.drm
  });

  try {
    await player.load(config.manifestUri);
    console.log("Stream cargado");
  } catch (e) {
    console.error(e);
  }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
